<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>全媒体运营师三级视听 · 在线考试</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#1d4ed8">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="理论考试">
  <link rel="apple-touch-icon" href="/icons/icon-192.svg">
</head>
<body>
  <div class="container" style="display:flex;align-items:center;min-height:100vh;">
    <div class="card" style="width:100%;max-width:460px;margin:0 auto;">
      <div style="margin-bottom:28px;">
        <h1>🎬 全媒体运营师三级视听</h1>
        <p class="text-muted" style="margin-top:4px;">在线模拟考试系统</p>
      </div>

      <!-- Step 1: 密码 -->
      <div id="step-password">
        <h2>请输入访问密码</h2>
        <input type="password" id="input-password" placeholder="访问密码" autocomplete="off">
        <div id="err-password" class="error"></div>
        <button class="btn btn-primary mt-16" id="btn-next" style="width:100%">下一步</button>
      </div>

      <!-- Step 2: 姓名 -->
      <div id="step-name" style="display:none">
        <h2>请输入你的姓名</h2>
        <p class="text-muted" style="margin-bottom:14px;">姓名用于保存你的错题记录</p>
        <input type="text" id="input-name" placeholder="你的姓名" maxlength="20">
        <div id="err-name" class="error"></div>
        <div class="flex gap-12 mt-16">
          <button class="btn btn-secondary" id="btn-back" style="flex:1">← 返回</button>
          <button class="btn btn-primary" id="btn-start" style="flex:2">开始答题</button>
        </div>
      </div>
    </div>
  </div>

  <script src="/js/common.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').then(reg => {
        reg.addEventListener('updatefound', () => {
          const nw = reg.installing;
          nw.addEventListener('statechange', () => {
            if (nw.state === 'installed' && navigator.serviceWorker.controller) {
              const bar = document.createElement('div');
              bar.style.cssText = 'position:fixed;bottom:0;left:0;right:0;background:#1d4ed8;color:#fff;text-align:center;padding:10px;font-size:.85rem;z-index:9999;cursor:pointer';
              bar.textContent = '✅ 已更新，点击刷新';
              bar.onclick = () => location.reload();
              document.body.appendChild(bar);
            }
          });
        });
      });
    }
  </script>
  <script>
    // 已登录直接跳答题页
    if (Auth.get()) location.href = '/exam';

    let tempPassword = '';

    const stepPwd  = document.getElementById('step-password');
    const stepName = document.getElementById('step-name');
    const errPwd   = document.getElementById('err-password');
    const errName  = document.getElementById('err-name');

    document.getElementById('btn-next').onclick = () => {
      const pwd = document.getElementById('input-password').value.trim();
      if (!pwd) { errPwd.textContent = '请输入密码'; return; }
      tempPassword = pwd;
      errPwd.textContent = '';
      stepPwd.style.display  = 'none';
      stepName.style.display = 'block';
      setTimeout(() => document.getElementById('input-name').focus(), 50);
    };

    document.getElementById('btn-back').onclick = () => {
      stepName.style.display = 'none';
      stepPwd.style.display  = 'block';
    };

    document.getElementById('btn-start').onclick = async () => {
      const name = document.getElementById('input-name').value.trim();
      if (!name) { errName.textContent = '请输入姓名'; return; }

      const btn = document.getElementById('btn-start');
      btn.disabled = true;
      btn.textContent = '验证中…';
      errName.textContent = '';

      const res = await API.post('/api/auth', { password: tempPassword, name });

      if (!res.ok) {
        btn.disabled = false;
        btn.textContent = '开始答题';
        if (res.error === '密码错误') {
          stepName.style.display = 'none';
          stepPwd.style.display  = 'block';
          errPwd.textContent = '密码错误，请重试';
        } else {
          errName.textContent = res.error || '登录失败，请重试';
        }
        return;
      }

      Auth.set({ userId: res.userId, name: res.name });
      location.href = '/exam';
    };

    document.getElementById('input-password').addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('btn-next').click();
    });
    document.getElementById('input-name').addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('btn-start').click();
    });
  </script>
</body>
</html>
